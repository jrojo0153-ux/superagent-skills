name: Quant Sports Trading Engine

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  execute-trading-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5 # Actualizado a v5 para evitar futuras advertencias
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Engine
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python src/main.py

      - name: Upload Trading Report Artifact
        uses: actions/upload-artifact@v4 # ¡Corregido a v4 aquí!
        with:
          name: reporte_trading_diario
          path: reporte_trading.md
          retention-days: 5
