name: Quant Sports Trading Engine

on:
  schedule:
    # Ejecuta el motor al inicio de cada hora (minuto 0)
    - cron: '0 * * * *'
  # Permite ejecución manual desde la interfaz de GitHub Actions
  workflow_dispatch:

jobs:
  execute-trading-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Engine
        env:
          # Inyección de secretos configurados en tu repositorio
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python src/main.py

      - name: Upload Trading Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte_trading_diario
          path: reporte_trading.md
          # El artefacto se retiene por 5 días antes de ser purgado automáticamente
          retention-days: 5
